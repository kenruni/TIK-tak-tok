<!DOCTYPE html>
<html lang="en">
<head>

  <title>Tetris Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #000;
      color: white;
      font-family: sans-serif;
    }

    canvas {
      background: #111;
      margin-top: 20px;
      touch-action: none;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 15px 20px;
      font-size: 18px;
      border: none;
      background: #444;
      color: white;
      border-radius: 5px;
    }

    .controls button:active {
      background: #888;
    }
  </style>
</head>

  </div>
